dataset_name: PKU-Alignment/BeaverTails
dataset_split_train: 30k_train
dataset_split_val: 30k_test

# Safety label field in the dataset
safety_label_field: is_safe
prompt_field: prompt
response_field: response
category_field: category

# Filtering: only keep samples where is_safe is explicitly True or False
# (some samples may have ambiguous labels)
filter_ambiguous: true

# Output columns written to JSONL
output_columns:
  - prompt
  - response
  - label        # 1 = safe/helpful, 0 = unsafe/should_refuse
  - category

# Train/val split ratios (applied on top of HF split)
val_fraction: 0.05

# Number of samples to use (null = all)
max_train_samples: null
max_val_samples: 2000

# Prompt format for SFT
# The formatter wraps prompt+response in chat-template format
prompt_format: chat   # "chat" | "raw"
add_system_prompt: true

seed: 42
